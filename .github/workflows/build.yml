name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone patched nih-plug
        run: git clone https://github.com/HeapHeapHooray/nih-plug-patched.git nih-plug-patched

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-shape0-dev libxcb-xfixes0-dev libxcb1-dev \
            libxkbcommon-dev libglib2.0-dev \
            libasound2-dev libjack-jackd2-dev \
            libgtk-3-dev libpango1.0-dev libgdk-pixbuf-2.0-dev \
            libatk1.0-dev libcairo2-dev git

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo xtask bundle copycat --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: copycat-linux
          path: target/bundled/

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone patched nih-plug
        run: git clone https://github.com/HeapHeapHooray/nih-plug-patched.git nih-plug-patched

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add MSVC target
        run: rustup target add x86_64-pc-windows-msvc

      - name: Build
        run: cargo xtask bundle copycat --release --target x86_64-pc-windows-msvc
        shell: pwsh

      - name: Copy onnxruntime to bundles
        shell: pwsh
        run: |
          Copy-Item target/release/onnxruntime.dll target/bundled/
          if (Test-Path target/bundled/copycat.vst3/Contents/x64-win) {
            Copy-Item target/release/onnxruntime.dll target/bundled/copycat.vst3/Contents/x64-win/
          }
          if (Test-Path target/bundled/copycat.vst3/Contents/x86_64-win) {
            Copy-Item target/release/onnxruntime.dll target/bundled/copycat.vst3/Contents/x86_64-win/
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: copycat-windows
          path: target/bundled/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: copycat-linux
          path: release/linux

      - uses: actions/download-artifact@v4
        with:
          name: copycat-windows
          path: release/windows

      - name: Package
        run: |
          cd release
          tar czf copycat-linux.tar.gz linux
          zip -r copycat-windows.zip windows

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/copycat-linux.tar.gz
            release/copycat-windows.zip
          generate_release_notes: true
