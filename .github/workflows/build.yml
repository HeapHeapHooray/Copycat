name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone patched nih-plug
        run: |
          rm -rf nih-plug-patched
          git clone https://github.com/HeapHeapHooray/nih-plug-patched.git nih-plug-patched

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-shape0-dev libxcb-xfixes0-dev libxcb1-dev \
            libxkbcommon-dev libglib2.0-dev \
            libasound2-dev libjack-jackd2-dev \
            libgtk-3-dev libpango1.0-dev libgdk-pixbuf-2.0-dev \
            libatk1.0-dev libcairo2-dev \
            libx11-dev libx11-xcb-dev libxcomposite-dev \
            libxcursor-dev libxdamage-dev libxi-dev \
            libxtst-dev libxrandr-dev libxrender-dev \
            libxss-dev libxxf86vm-dev

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: |
          cargo xtask bundle copycat --release
          cargo build --package copycat_installer --release
          cp target/release/copycat_installer target/bundled/

      - name: Test Installer Silently
        run: |
          cd target/bundled/
          ./copycat_installer --silent
          # Verify installation
          test -f ~/.clap/copycat.clap
          test -d ~/.vst3/copycat.vst3
          test -d ~/.local/share/copycat/models/GAME-1.0.3-large-onnx

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: copycat-linux
          path: target/bundled/

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone patched nih-plug
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force nih-plug-patched -ErrorAction SilentlyContinue
          git clone https://github.com/HeapHeapHooray/nih-plug-patched.git nih-plug-patched

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add MSVC target
        run: rustup target add x86_64-pc-windows-msvc

      - name: Build
        run: |
          cargo xtask bundle copycat --release --target x86_64-pc-windows-msvc
          cargo build --package copycat_installer --release --target x86_64-pc-windows-msvc
        shell: pwsh

      - name: Copy installer to bundles
        shell: pwsh
        run: |
          Copy-Item target/x86_64-pc-windows-msvc/release/copycat_installer.exe target/bundled/

      - name: Copy onnxruntime to bundles
        shell: pwsh
        run: |
          $dll = Get-ChildItem -Path target -Filter onnxruntime.dll -Recurse | Select-Object -First 1
          if ($dll) {
            Copy-Item $dll.FullName target/bundled/
            $vst3dirs = @(
              "target/bundled/copycat.vst3/Contents/x64-win",
              "target/bundled/copycat.vst3/Contents/x86_64-win"
            )
            foreach ($d in $vst3dirs) {
              if (Test-Path $d) { Copy-Item $dll.FullName $d/ }
            }
          }

      - name: Test Installer Silently
        shell: pwsh
        run: |
          cd target/bundled
          ./copycat_installer.exe --silent
          # Verify installation (since it runs as non-admin, it falls back to user paths)
          $localAppData = $env:LOCALAPPDATA
          $userProfile = $env:USERPROFILE
          if (!(Test-Path "$localAppData\Programs\Common\CLAP\copycat.clap")) { throw "CLAP not installed" }
          if (!(Test-Path "$localAppData\Programs\Common\VST3\copycat.vst3")) { throw "VST3 not installed" }
          if (!(Test-Path "$userProfile\copycat\models\GAME-1.0.3-large-onnx")) { throw "Model not installed" }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: copycat-windows
          path: target/bundled/

  release:
    if: github.ref_type == 'tag'
    needs: [linux, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: copycat-linux
          path: release/linux

      - uses: actions/download-artifact@v4
        with:
          name: copycat-windows
          path: release/windows

      - name: Package
        run: |
          cd release
          tar czf copycat-linux.tar.gz -C linux .
          cd windows && zip -r ../copycat-windows.zip .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/copycat-linux.tar.gz
            release/copycat-windows.zip
          generate_release_notes: true
